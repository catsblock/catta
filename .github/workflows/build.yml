name: Catta Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Build
        run: |
          # The --continue lets us see the full error if it fails
          gradle assembleDebug --stacktrace --continue
          
          # This will print the location of the APK to the logs
          echo "SEARCHING FOR APK..."
          find . -name "*.apk"
        working-directory: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Catta-Release
          # Using a double wildcard to find it anywhere in the build tree
          path: "**/build/outputs/apk/debug/*.apk"
          
