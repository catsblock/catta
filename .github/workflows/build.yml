name: Catta Build Pipeline
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          # If gradlew is in the root, this works. 
          # If it is inside /app, change the line below to 'cd app'
          chmod +x gradlew
          ./gradlew assembleDebug
        working-directory: .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Catta-Build
          path: app/build/outputs/apk/debug/catta.apk
          
