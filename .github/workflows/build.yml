name: Catta Build Pipeline
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          # Grant permissions and build
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # Find the generated APK and copy it to the root as catta.apk
          # This works even if the APK is in app/build/outputs/apk/debug/
          find . -name "*.apk" -type f -exec cp {} ./catta.apk \;
          
          # Verify the file is in the root
          ls -lh catta.apk
        working-directory: .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Catta-Build
          path: catta.apk
          if-no-files-found: error
          
