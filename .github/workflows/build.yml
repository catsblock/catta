name: Catta Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Build
        run: |
          # The --continue ensures we see every error if it fails
          gradle assembleDebug --stacktrace --continue
        working-directory: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Catta-Release
          path: "**/build/outputs/apk/debug/*.apk"
          
